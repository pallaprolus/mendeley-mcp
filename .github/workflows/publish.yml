name: Publish to PyPI

# Publishing is driven by version tags only. Pushing a v* tag publishes to
# PyPI and then auto-creates the matching GitHub Release from CHANGELOG.md.
# The release is created by the github-release job below (not by a release
# event), so it cannot trigger a second upload.
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for trusted publishing

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No API token needed with trusted publishing!

  github-release:
    # Runs only after a successful PyPI publish, so the release page never
    # advertises a version that failed to upload.
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to create the GitHub Release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build release notes from CHANGELOG
        id: notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Pull the section for this version: everything between its heading
          # and the next "## [" heading.
          awk -v ver="$version" '
            $0 ~ ("^## \\[" ver "\\]") {flag=1; next}
            flag && /^## \[/ {flag=0}
            flag {print}
          ' CHANGELOG.md > release_notes.md

          # Optional curated title: if the heading ends with "— summary"
          # (e.g. "## [0.4.0] - 2026-06-14 — Full-text PDF reading"), use it;
          # otherwise the title is just the tag.
          heading="$(grep -m1 "^## \[$version\]" CHANGELOG.md || true)"
          summary="$(printf '%s' "$heading" | sed -n 's/.*—[[:space:]]*//p')"
          if [ -n "$summary" ]; then
            echo "title=$GITHUB_REF_NAME — $summary" >> "$GITHUB_OUTPUT"
          else
            echo "title=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
          fi

          if [ -s release_notes.md ]; then
            printf '\n**Install:** `pip install -U mendeley-mcp`\n' >> release_notes.md
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists; nothing to do."
            exit 0
          fi
          if [ "${{ steps.notes.outputs.found }}" = "true" ]; then
            gh release create "$GITHUB_REF_NAME" \
              --verify-tag \
              --title "${{ steps.notes.outputs.title }}" \
              --notes-file release_notes.md
          else
            # No CHANGELOG entry found — fall back to autogenerated notes.
            gh release create "$GITHUB_REF_NAME" \
              --verify-tag \
              --title "${{ steps.notes.outputs.title }}" \
              --generate-notes
          fi
